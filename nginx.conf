# Production nginx configuration for TWISTED.

events {
    worker_connections 1024;
}

http {
    include       mime.types;
    default_type  application/octet-stream;

    upstream twisted_api {
        server twisted-api:8000;
    }

    # Rate limiting zones
    limit_req_zone $binary_remote_addr zone=api:10m rate=10r/s;
    limit_req_zone $binary_remote_addr zone=ws:10m rate=100r/s;

    # SSL configuration
    server {
        listen 443 ssl http2;
        server_name twisted.local;

        ssl_certificate /etc/nginx/ssl/twisted.crt;
        ssl_certificate_key /etc/nginx/ssl/twisted.key;
        ssl_protocols TLSv1.3;
        ssl_ciphers HIGH:!aNULL:!MD5;

        # Frontend static files
        location / {
            root /usr/share/nginx/html;
            try_files $uri $uri/ /index.html;
            expires 1h;
            add_header Cache-Control "public, immutable";
        }

        # API with rate limiting
        location /api/ {
            limit_req zone=api burst=20 nodelay;
            proxy_pass http://twisted_api;
            proxy_http_version 1.1;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
        }

        # WebSocket with higher rate limit
        location /ws/ {
            limit_req zone=ws burst=100 nodelay;
            proxy_pass http://twisted_api;
            proxy_http_version 1.1;
            proxy_set_header Upgrade $http_upgrade;
            proxy_set_header Connection "upgrade";
            proxy_set_header Host $host;
            proxy_read_timeout 86400;
        }
    }

    # HTTP redirect to HTTPS
    server {
        listen 80;
        server_name twisted.local;
        return 301 https://$server_name$request_uri;
    }
}
